version: '3.8'

services:
  nvidia-gpu-nim-toolkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: nvidia-gpu-nim-toolkit:latest
    container_name: nvidia-gpu-nim-toolkit
    
    # GPU access configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # Alternative for older docker-compose versions
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    # Volume mounts for persistent data
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For container monitoring
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    # Network configuration
    ports:
      - "8080:8080"  # Web interface (if implemented in future)
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "nvidia-toolkit", "system-info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Command override for interactive use
    # command: nvidia-toolkit features

  # Optional: Prometheus monitoring (uncomment to enable)
  # prometheus:
  #   image: prom/prometheus:latest
